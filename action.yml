name: 'AI PR Pipeline'
description: 'Automated PR creation, AI code review, and auto-merge for your repos'
author: 'SA-Baitham'

inputs:
  github_token:
    description: 'GitHub token for API operations'
    required: true
  ai_provider:
    description: 'AI provider to use (openai, anthropic, local)'
    required: false
    default: 'openai'
  ai_api_key:
    description: 'API key for the AI provider'
    required: false
    default: ''
  ai_model:
    description: 'Model name (default: deepseek-v4-flash-free via OpenCode Zen)'
    required: false
    default: 'deepseek-v4-flash-free'
  ai_endpoint:
    description: 'API endpoint (default: https://opencode.ai/zen/v1)'
    required: false
    default: 'https://opencode.ai/zen/v1'
  auto_merge:
    description: 'Enable auto-merge when review passes (true/false)'
    required: false
    default: 'false'
  auto_merge_method:
    description: 'Merge method (merge, squash, rebase)'
    required: false
    default: 'squash'
  review_style:
    description: 'Review strictness (light, normal, thorough)'
    required: false
    default: 'normal'
  label_rules:
    description: 'JSON string of label-based rules'
    required: false
    default: '{}'

runs:
  using: 'composite'
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: bash
      run: |
        pip install -q -r ${{ github.action_path }}/requirements.txt

    - name: Run AI Pipeline
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        AI_PROVIDER: ${{ inputs.ai_provider }}
        AI_API_KEY: ${{ inputs.ai_api_key }}
        AI_MODEL: ${{ inputs.ai_model }}
        AI_ENDPOINT: ${{ inputs.ai_endpoint }}
        HTTP_REFERER: ${{ github.server_url }}/${{ github.repository }}
        X_TITLE: ${{ github.repository }}
        AUTO_MERGE: ${{ inputs.auto_merge }}
        AUTO_MERGE_METHOD: ${{ inputs.auto_merge_method }}
        REVIEW_STYLE: ${{ inputs.review_style }}
        LABEL_RULES: ${{ inputs.label_rules }}
      run: |
        python ${{ github.action_path }}/src/main.py
